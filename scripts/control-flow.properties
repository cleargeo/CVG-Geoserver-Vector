# =============================================================================
# CVG GeoServer Vector — GeoServer Request Control Flow Configuration
# (c) Clearview Geographic, LLC — Proprietary
# =============================================================================
# INSTALLATION:
#   Copy this file to the GeoServer data_dir on the production VM:
#     docker cp scripts/control-flow.properties geoserver-vector:/opt/geoserver/data_dir/
#   OR mount as a Docker volume in docker-compose.prod.yml:
#     - ./scripts/control-flow.properties:/opt/geoserver/data_dir/control-flow.properties:ro
#
# REFERENCE:
#   https://docs.geoserver.org/stable/en/user/extensions/controlflow/index.html
#   Requires the control-flow extension plugin (install from GeoServer extensions).
#
# PURPOSE:
#   Prevents GeoServer from being overwhelmed by:
#     - Bulk WFS GetFeature downloads saturating database connections
#     - Too many simultaneous WFS requests causing PostGIS connection exhaustion
#     - Single-client bulk feature scraping floods
# =============================================================================

# ── Global Request Limits ─────────────────────────────────────────────────────

# Maximum total concurrent OGC requests (WFS + WMS).
# VM455 has 4 vCPUs; WFS is I/O + PostGIS query bound.
# Allow up to 24 concurrent requests (6x vCPU count).
ows.global=24

# Maximum queue wait time before rejecting a request.
# WFS GetFeature against large PostGIS datasets can be slow.
timeout=90

# ── Per-Service Limits ────────────────────────────────────────────────────────

# WFS GetFeature — primary vector service.
# PostGIS connection pool should be configured to match (typically 10-20 connections).
ows.wfs.getfeature=12

# WFS GetCapabilities — fast; allow reasonable concurrency
ows.wfs.getcapabilities=6

# WFS DescribeFeatureType — schema lookup; lightweight
ows.wfs.describefeaturetype=8

# WFS-T (Transaction: Insert/Update/Delete) — write ops; serialize per-store
ows.wfs.transaction=4

# WMS GetMap — vector rendering; allow more than WFS as it's CPU-not-DB bound
ows.wms.getmap=12

# WMS GetFeatureInfo — lightweight popup attr query
ows.wms.getfeatureinfo=8

# WMS GetCapabilities — cached XML
ows.wms.getcapabilities=4

# ── Per-User / Per-IP Limits ──────────────────────────────────────────────────

# Maximum concurrent requests per user (anonymous = tracked by IP).
# Prevents a single web map client from flooding WFS with bbox queries.
user=4

# ── Timeout for large WFS responses ──────────────────────────────────────────

# WFS GetFeature with large result sets times out after 300s.
# Matches the Caddyfile write_timeout for WFS streaming.
ows.wfs.getfeature.timeout=300

# ── Notes ─────────────────────────────────────────────────────────────────────
# After installing the control-flow.properties, restart GeoServer to apply:
#   docker compose -f docker-compose.prod.yml restart geoserver-vector
#
# If WFS GetFeature requests are slow or timing out, check PostGIS connection
# pool size in your datastore configuration. The pool size should be >= to
# the ows.wfs.getfeature limit above.
#
# For PostGIS datastores, configure in GeoServer Admin:
#   min connections: 2
#   max connections: 12
#   connection timeout: 30
#   validate connections: true
